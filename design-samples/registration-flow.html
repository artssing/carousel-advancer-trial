<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authentik · 註冊流程 Mock</title>
<style>
  :root{
    --bg:#f4f7f9;--surface:#fff;--line:#E8EBEF;--line-2:#d7dce2;
    --text:#16233a;--text-2:#505b6b;--text-3:#8b95a3;
    --primary:#0A2540;--action:#008766;--action-2:#00745a;--accent:#00C48C;
    --verify:#008766;--verify-soft:#e3f4ee;--verify-border:#b6e2d3;--danger:#b23b2b;
    --sans:"PingFang HK","Noto Sans HK","Microsoft JhengHei","Inter",-apple-system,"Segoe UI",sans-serif;
    --sh-1:0 6px 20px -14px rgba(10,37,64,.28);--sh-2:0 14px 40px -18px rgba(10,37,64,.32);
    --radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}
  /* top brand */
  .top{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--line);background:var(--surface)}
  .brand{font-size:18px;letter-spacing:.2em;font-weight:800;color:var(--primary)}
  .brand span{color:var(--action)}
  .top .help{font-size:13px;color:var(--text-3)}
  /* stage */
  .stage{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px 60px}
  .card{width:100%;max-width:480px;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh-2);overflow:hidden}
  /* progress */
  .prog{display:flex;gap:6px;padding:16px 24px 0}
  .prog .seg{flex:1;height:4px;border-radius:2px;background:var(--line)}
  .prog .seg.done{background:var(--action)}
  .prog .seg.cur{background:var(--accent)}
  .stepmeta{display:flex;justify-content:space-between;align-items:baseline;padding:12px 24px 0}
  .stepmeta .k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--action);font-weight:700}
  .stepmeta .c{font-size:11px;color:var(--text-3)}
  .body{padding:14px 24px 24px}
  .body h1{font-size:23px;font-weight:800;color:var(--primary);letter-spacing:-.01em}
  .body .sub{color:var(--text-2);font-size:14px;margin:6px 0 20px}
  /* fields */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:6px}
  .field .hint{font-weight:400;color:var(--text-3)}
  .input{width:100%;font-family:inherit;font-size:15px;color:var(--text);background:#fff;border:1px solid var(--line-2);border-radius:var(--radius-sm);padding:12px 13px;transition:.15s}
  .input:focus{outline:none;border-color:var(--action);box-shadow:0 0 0 3px rgba(0,135,102,.15)}
  .inwrap{position:relative}
  .inwrap .ok{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--action);font-size:13px;font-weight:700}
  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;font-size:15px;font-weight:600;padding:13px 20px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid transparent;transition:.15s;width:100%}
  .btn-primary{background:var(--action);color:#fff;box-shadow:0 8px 20px -10px rgba(0,135,102,.5)}
  .btn-primary:hover{background:var(--accent)}
  .btn-ghost{background:#fff;border-color:var(--line-2);color:var(--text)}
  .btn-ghost:hover{border-color:var(--action);color:var(--action)}
  .btn-row{display:flex;gap:10px;margin-top:8px}
  .btn.sm{font-size:13px;padding:10px 14px;width:auto}
  /* oauth */
  .oauth{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
  .oauth button{display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid var(--line-2);background:#fff;border-radius:var(--radius-sm);padding:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
  .oauth button:hover{background:#f7f9fb}
  .divider-txt{display:flex;align-items:center;gap:12px;color:var(--text-3);font-size:12px;margin:4px 0 16px}
  .divider-txt::before,.divider-txt::after{content:"";flex:1;height:1px;background:var(--line)}
  .foot-note{font-size:12px;color:var(--text-3);text-align:center;margin-top:16px;line-height:1.6}
  .foot-note a{color:var(--action);font-weight:600}
  /* password strength */
  .pw-meter{display:flex;gap:5px;margin-top:8px}
  .pw-meter .b{flex:1;height:4px;border-radius:2px;background:var(--line)}
  .pw-meter .b.on{background:var(--accent)}
  .pw-label{font-size:11px;color:var(--text-3);margin-top:5px}
  /* otp */
  .otp{display:flex;gap:10px;justify-content:space-between;margin:6px 0 8px}
  .otp input{width:52px;height:60px;text-align:center;font-size:24px;font-weight:700;border:1px solid var(--line-2);border-radius:10px;font-family:inherit;color:var(--primary)}
  .otp input:focus{outline:none;border-color:var(--action);box-shadow:0 0 0 3px rgba(0,135,102,.15)}
  .resend{font-size:13px;color:var(--text-3);text-align:center;margin-top:6px}
  .resend b{color:var(--action)}
  /* interests */
  .chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
  .chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line-2);border-radius:999px;padding:9px 15px;font-size:14px;font-weight:600;color:var(--text-2);cursor:pointer;background:#fff;user-select:none}
  .chip.on{border-color:var(--action);background:var(--verify-soft);color:var(--action-2)}
  .chip .em{font-size:15px}
  /* kyc */
  .why{background:var(--verify-soft);border:1px solid var(--verify-border);border-radius:10px;padding:14px;margin-bottom:16px}
  .why .h{font-weight:700;font-size:13px;color:var(--action-2);display:flex;align-items:center;gap:8px}
  .why ul{margin:8px 0 0 4px;padding:0;list-style:none;font-size:13px;color:var(--text-2)}
  .why li{padding:3px 0;display:flex;gap:8px}
  .why li::before{content:"✓";color:var(--action);font-weight:800}
  .kyc-opt{display:flex;gap:12px;align-items:center;border:1px solid var(--line-2);border-radius:10px;padding:14px;cursor:pointer;margin-bottom:10px}
  .kyc-opt .ic{width:40px;height:40px;border-radius:10px;background:var(--verify-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  /* consent */
  .consent{display:flex;gap:9px;align-items:flex-start;font-size:12px;color:var(--text-2);margin:4px 0 14px;line-height:1.55}
  .consent input{margin-top:2px}
  .consent a{color:var(--action);font-weight:600}
  /* done */
  .done{text-align:center;padding:14px 0 4px}
  .done .seal{width:76px;height:76px;border-radius:50%;background:var(--verify-soft);border:1px solid var(--verify-border);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
  .done h1{font-size:24px}
  .done .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
  .done .cards a{border:1px solid var(--line);border-radius:12px;padding:16px;text-align:left;box-shadow:var(--sh-1)}
  .done .cards a:hover{border-color:var(--action)}
  .done .cards .t{font-weight:700;margin-top:8px}
  .done .cards .d{font-size:12px;color:var(--text-3);margin-top:3px}
  .hidden{display:none}
</style>
</head>
<body>
  <div class="top">
    <div class="brand">AUTHEN<span>·</span>TIK</div>
    <div class="help">已有帳戶？<a href="#" style="color:var(--action);font-weight:600">登入</a></div>
  </div>

  <div class="stage">
    <div class="card">
      <div class="prog" id="prog"></div>
      <div class="stepmeta"><span class="k" id="metaK"></span><span class="c" id="metaC"></span></div>
      <div class="body" id="body"></div>
    </div>
  </div>

<script>
const STEPS = [
  // 0 — choose method
  {k:'開始', title:'建立你的帳戶', sub:'加入 Authentik，安心買賣經鑑定的正品。',
   html:`
     <div class="oauth">
       <button><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23 12.3c0-.8-.1-1.5-.2-2.3H12v4.5h6.2a5.3 5.3 0 0 1-2.3 3.5v2.9h3.7c2.2-2 3.4-5 3.4-8.6z"/><path fill="#34A853" d="M12 24c3.1 0 5.7-1 7.6-2.8l-3.7-2.9c-1 .7-2.3 1.1-3.9 1.1-3 0-5.5-2-6.4-4.7H1.8v3A12 12 0 0 0 12 24z"/><path fill="#FBBC05" d="M5.6 14.7a7.2 7.2 0 0 1 0-4.6v-3H1.8a12 12 0 0 0 0 10.6l3.8-3z"/><path fill="#EA4335" d="M12 4.8c1.7 0 3.2.6 4.4 1.7l3.3-3.3A12 12 0 0 0 1.8 6.5l3.8 3C6.5 6.8 9 4.8 12 4.8z"/></svg> 用 Google 繼續</button>
       <button><svg width="16" height="16" viewBox="0 0 24 24" fill="#000"><path d="M16.4 12.8c0-2.2 1.8-3.3 1.9-3.3-1-1.5-2.6-1.7-3.2-1.7-1.3-.1-2.6.8-3.3.8-.7 0-1.7-.8-2.8-.8-1.4 0-2.8.8-3.5 2.1-1.5 2.6-.4 6.5 1.1 8.6.7 1 1.5 2.2 2.6 2.1 1-.04 1.5-.7 2.7-.7s1.6.7 2.8.6c1.2 0 1.9-1 2.6-2 .8-1.2 1.2-2.3 1.2-2.4-.03-.01-2.3-.9-2.4-3.2zM14.3 6.3c.6-.7 1-1.7.9-2.7-.9 0-1.9.6-2.5 1.3-.5.6-1 1.6-.9 2.6 1 .07 2-.5 2.5-1.2z"/></svg> 用 Apple 繼續</button>
     </div>
     <div class="divider-txt">或用電郵註冊</div>
     <button class="btn btn-primary" onclick="go(1)">用電郵繼續</button>
     <p class="foot-note">繼續即表示你同意 <a href="#">服務條款</a> 及 <a href="#">私隱政策</a>。</p>
   `},
  // 1 — email + password
  {k:'帳戶', title:'設定登入資料', sub:'我們會寄一個驗證碼到你的電郵。',
   html:`
     <div class="field"><label>電郵地址</label><input class="input" type="email" placeholder="you@example.com" value="ernest@example.com"></div>
     <div class="field"><label>設定密碼 <span class="hint">· 最少 8 個字元</span></label>
       <input class="input" type="password" placeholder="••••••••" value="Aa123456!" oninput="strength(this.value)">
       <div class="pw-meter" id="pm"><span class="b"></span><span class="b"></span><span class="b"></span><span class="b"></span></div>
       <div class="pw-label" id="pl">密碼強度：—</div>
     </div>
     <div class="consent"><input type="checkbox" checked><span>我已年滿 18 歲，並同意 <a href="#">服務條款</a> 及 <a href="#">私隱政策</a>。</span></div>
     <button class="btn btn-primary" onclick="go(2)">寄出驗證碼</button>
   `},
  // 2 — OTP
  {k:'驗證', title:'輸入驗證碼', sub:'我們已寄 6 位數字驗證碼到 ernest@example.com。',
   html:`
     <div class="otp">
       <input maxlength="1" value="4" inputmode="numeric"><input maxlength="1" value="8" inputmode="numeric"><input maxlength="1" value="2" inputmode="numeric">
       <input maxlength="1" value="1" inputmode="numeric"><input maxlength="1" value="9" inputmode="numeric"><input maxlength="1" inputmode="numeric">
     </div>
     <div class="resend">未收到？<b>52 秒後可重寄</b></div>
     <button class="btn btn-primary" style="margin-top:16px" onclick="go(3)">驗證並繼續</button>
     <button class="btn btn-ghost" style="margin-top:10px" onclick="go(1)">改用其他電郵</button>
   `},
  // 3 — profile basics
  {k:'個人資料', title:'建立個人檔案', sub:'這些資料會顯示於你的公開檔案。',
   html:`
     <div style="display:flex;gap:16px;align-items:center;margin-bottom:16px">
       <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#eef1f5,#dfe4ee);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;color:var(--primary)">E</div>
       <button class="btn btn-ghost sm">上載頭像</button>
     </div>
     <div class="field"><label>顯示名稱</label><input class="input" value="Ernest Wong"></div>
     <div class="field"><label>用戶名 <span class="hint">· 公開，唯一</span></label>
       <div class="inwrap"><input class="input" value="ernestw"><span class="ok">✓ 可用</span></div></div>
     <div class="field"><label>地區</label>
       <select class="input"><option>香港島</option><option>九龍</option><option>新界</option></select></div>
     <button class="btn btn-primary" onclick="go(4)">繼續</button>
   `},
  // 4 — interests
  {k:'興趣', title:'你想收藏 / 交易咩？', sub:'揀你有興趣的品類，我們會為你個人化首頁（可隨時修改）。',
   html:`
     <div class="chips" id="chips">
       <span class="chip on" onclick="tog(this)"><span class="em">👜</span>名牌手袋</span>
       <span class="chip on" onclick="tog(this)"><span class="em">⌚</span>腕錶</span>
       <span class="chip" onclick="tog(this)"><span class="em">👟</span>波鞋 / 潮物</span>
       <span class="chip" onclick="tog(this)"><span class="em">💎</span>珠寶首飾</span>
       <span class="chip" onclick="tog(this)"><span class="em">🃏</span>卡牌收藏</span>
       <span class="chip" onclick="tog(this)"><span class="em">📷</span>相機影音</span>
       <span class="chip" onclick="tog(this)"><span class="em">🍷</span>名酒</span>
       <span class="chip" onclick="tog(this)"><span class="em">🧸</span>設計師玩具</span>
     </div>
     <div class="btn-row"><button class="btn btn-ghost" onclick="go(5)">略過</button><button class="btn btn-primary" onclick="go(5)">繼續</button></div>
   `},
  // 5 — KYC (optional, gated later)
  {k:'身分驗證', title:'驗證身分（可稍後）', sub:'瀏覽和追蹤無需驗證。買賣及提現前需完成身分驗證。',
   html:`
     <div class="why">
       <div class="h"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#00745a" stroke-width="2"><path d="M12 2l7 4v6c0 5-3.5 8-7 10-3.5-2-7-5-7-10V6l7-4z"/></svg>點解要驗證？</div>
       <ul><li>保障款項託管，防止詐騙</li><li>解鎖買賣、出價及提現功能</li><li>高單價（Tier 3）交易的必要條件</li></ul>
     </div>
     <div class="kyc-opt">
       <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#008766" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg></div>
       <div style="flex:1"><div style="font-weight:600;font-size:14px">香港身分證 / 護照</div><div style="font-size:12px;color:var(--text-3)">拍攝證件 + 自拍，約 2 分鐘</div></div>
       <span style="color:var(--text-3)">›</span>
     </div>
     <button class="btn btn-primary" onclick="go(6)">立即驗證</button>
     <button class="btn btn-ghost" style="margin-top:10px" onclick="go(6)">稍後再做，先去逛逛</button>
     <p class="foot-note">身分資料由第三方 KYC 服務加密處理，Authentik 不會儲存你的證件影像。</p>
   `},
  // 6 — done
  {k:'完成', title:'', sub:'',
   html:`
     <div class="done">
       <div class="seal"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#008766" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg></div>
       <h1>歡迎加入 Authentik，Ernest！</h1>
       <p class="sub" style="margin-top:8px">你的帳戶已建立。開始探索經鑑定的正品，或刊登你的第一件貨品。</p>
       <div class="cards">
         <a href="#"><span style="font-size:22px">🔎</span><div class="t">開始瀏覽</div><div class="d">睇熱門手袋、腕錶、潮物</div></a>
         <a href="#"><span style="font-size:22px">🏷️</span><div class="t">刊登出售</div><div class="d">賣出你的收藏</div></a>
       </div>
       <button class="btn btn-primary" style="margin-top:20px" onclick="go(0)">↻ 重新睇一次流程</button>
     </div>
   `},
];

const TOTAL = STEPS.length;
function render(i){
  const s = STEPS[i];
  // progress segments (exclude final done from count-styling but include)
  let prog = '';
  for(let n=0;n<TOTAL;n++){ prog += `<span class="seg ${n<i?'done':(n===i?'cur':'')}"></span>`; }
  document.getElementById('prog').innerHTML = prog;
  document.getElementById('metaK').textContent = s.k;
  document.getElementById('metaC').textContent = i<TOTAL-1 ? `步驟 ${i+1} / ${TOTAL-1}` : '';
  let inner = '';
  if(s.title) inner += `<h1>${s.title}</h1>`;
  if(s.sub) inner += `<p class="sub">${s.sub}</p>`;
  inner += s.html;
  // back link (except step0 and done)
  if(i>0 && i<TOTAL-1){ inner += `<p class="foot-note"><a href="#" onclick="go(${i-1});return false" style="color:var(--text-3)">← 返回上一步</a></p>`; }
  document.getElementById('body').innerHTML = inner;
  window.scrollTo(0,0);
}
function go(i){ render(Math.max(0,Math.min(TOTAL-1,i))); }
function strength(v){
  let s=0; if(v.length>=8)s++; if(/[A-Z]/.test(v))s++; if(/[0-9]/.test(v))s++; if(/[^A-Za-z0-9]/.test(v))s++;
  const bars=document.querySelectorAll('#pm .b'); bars.forEach((b,n)=>b.classList.toggle('on',n<s));
  const L=['—','弱','普通','良好','強']; document.getElementById('pl').textContent='密碼強度：'+L[s];
}
function tog(el){ el.classList.toggle('on'); }
render(0);
</script>
</body>
</html>
