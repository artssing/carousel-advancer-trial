# Public-testing stack — completely isolated from local dev.
#
# Containers:
#   postgres-public         Postgres on 5433 (separate volume)
#   cloudflared-api         Tunnel for host's API on 4010
#   cloudflared-consumer    Tunnel for host's Consumer on 3018
#   cloudflared-auth        (optional, profile=auth)  → 3011
#   cloudflared-admin       (optional, profile=admin) → 3012
#
# Tunnels reach host services via `host.docker.internal` (mapped via
# `host-gateway` for Linux compat). On macOS / Windows Docker Desktop
# this is built-in. Trycloudflare quick mode → no auth/config needed.
#
# Start/stop via ./scripts/public-up.sh and ./scripts/public-down.sh.

services:
  postgres-public:
    image: postgres:16-alpine
    container_name: authentik-postgres-public
    restart: unless-stopped
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: authentik_public_dev
      POSTGRES_DB: authentik
    ports:
      - '5433:5432'
    volumes:
      - authentik_pg_data_public:/var/lib/postgresql/data

  cloudflared-api:
    image: cloudflare/cloudflared:latest
    container_name: authentik-tunnel-api
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://host.docker.internal:4010
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cloudflared-consumer:
    image: cloudflare/cloudflared:latest
    container_name: authentik-tunnel-consumer
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://host.docker.internal:3018
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cloudflared-auth:
    image: cloudflare/cloudflared:latest
    container_name: authentik-tunnel-auth
    profiles: ["auth"]
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://host.docker.internal:3011
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cloudflared-admin:
    image: cloudflare/cloudflared:latest
    container_name: authentik-tunnel-admin
    profiles: ["admin"]
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://host.docker.internal:3012
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  authentik_pg_data_public:
