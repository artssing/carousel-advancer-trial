<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鑑定師申請 · Authentik</title>
<link rel="stylesheet" href="theme.css">
<style>
  .topbar{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  .topbar .in{max-width:900px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
  .topbar .brand{font-size:19px;letter-spacing:.18em;font-weight:800;color:var(--primary)}
  .topbar .brand span{color:var(--action)}
  .wrap{max-width:900px;margin:0 auto;padding:36px 24px 72px;display:grid;grid-template-columns:240px 1fr;gap:40px;align-items:start}
  .steps{position:sticky;top:88px}
  .step{display:flex;gap:13px;padding:14px 0;border-bottom:1px solid var(--line)}
  .step:last-child{border-bottom:0}
  .step .num{width:26px;height:26px;border-radius:50%;border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;color:var(--text-3);font-weight:700}
  .step.on .num{background:var(--action);border-color:var(--action);color:#fff}
  .step.done .num{background:var(--brand-soft);border-color:var(--action);color:var(--action)}
  .step .t{font-size:14px;font-weight:600}.step.on .t{color:var(--primary)}.step:not(.on) .t{color:var(--text-3)}
  .step .d{font-size:12px;color:var(--text-3);margin-top:2px}
  .panel{max-width:560px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .upload{border:1px dashed var(--line-2);border-radius:10px;padding:22px;text-align:center;background:var(--surface-2)}
  .foot{display:flex;justify-content:space-between;margin-top:30px;padding-top:22px;border-top:1px solid var(--line)}
</style>
</head>
<body>
<header class="topbar"><div class="in">
  <div class="brand">AUTHEN<span>·</span>TIK</div>
  <span class="mono">鑑定師申請</span>
</div></header>

<div class="wrap">
  <aside class="steps">
    <div class="section-label">申請進度</div>
    <div class="step done"><div class="num">✓</div><div><div class="t">帳戶與身分</div><div class="d">已驗證</div></div></div>
    <div class="step on"><div class="num">2</div><div><div class="t">專業資歷</div><div class="d">專長 · 年資 · 證書</div></div></div>
    <div class="step"><div class="num">3</div><div><div class="t">店舖與收費</div><div class="d">地址 · 費率</div></div></div>
    <div class="step"><div class="num">4</div><div><div class="t">合約與 E&amp;O 保險</div><div class="d">責任聲明</div></div></div>
    <div class="step"><div class="num">5</div><div><div class="t">審核</div><div class="d">1–3 工作天</div></div></div>
  </aside>

  <section class="panel">
    <div class="eyebrow">步驟 2 / 5</div>
    <h1 class="display" style="font-size:28px;margin:10px 0 8px">專業資歷</h1>
    <p style="color:var(--text-2)">你的資歷會構成公開檔案。星級不由此填寫決定 —— 星級純由日後完成單數與爭議率演算派生，平台不可手改。</p>

    <div style="margin-top:26px">
      <div class="field"><label>鑑定專長 <span class="hint">可多選，決定可接單品類</span></label>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px">
          <span class="pill pill-brand">名牌手袋 ✓</span><span class="pill pill-tier">腕錶</span>
          <span class="pill pill-tier">波鞋</span><span class="pill pill-tier">珠寶首飾</span><span class="pill pill-tier">卡牌收藏</span></div></div>
      <div class="two">
        <div class="field"><label>從業年資</label><input class="input" placeholder="例：8 年"></div>
        <div class="field"><label>每週可接單量</label><input class="input" placeholder="例：30 單"></div></div>
      <div class="field"><label>專業簡介 <span class="hint">公開，建議 50–150 字</span></label>
        <textarea class="textarea" placeholder="例：前拍賣行手袋部門鑑定師，專攻 Chanel 及 Hermès⋯"></textarea></div>
      <div class="field"><label>資歷證明 <span class="hint">證書、僱主證明或作品集</span></label>
        <div class="upload"><div style="font-weight:600;font-size:14px">上載證明文件</div>
          <div class="mono" style="margin:6px 0 12px">PDF / JPG / PNG · 單檔上限 10MB</div>
          <button class="btn btn-ghost btn-sm">選擇檔案</button><input type="file" hidden></div></div>
    </div>

    <div class="note-brand">審核只核實你的身分與資歷真確性，不代表平台為你的鑑定結果背書。所有鑑定責任由你按合約及 E&amp;O 保險承擔。</div>

    <div class="foot"><button class="btn btn-ghost">← 上一步</button><button class="btn btn-primary btn-lg">儲存並繼續 →</button></div>
  </section>
</div>
</body>
</html>
