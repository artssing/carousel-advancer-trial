# ─────────────────────────────────────────────────────────────────────────
# CI infra stack —  Jenkins + n8n（同 app stack 完全分開）
#   起 / 停：用 ./ci.sh（唔好手動記指令）
#     ./ci.sh start | stop | status | logs
#
# 設計：
#   • Jenkins :8080  — build 引擎；借 host docker socket build image + deploy
#   • n8n     :5678  — 膠水/通知/approve/定時
#   • 兩個都 mount 自己 volume（job 歷史 / workflow 唔會冇咗）
#   • repo bind-mount 落 Jenkins /repo（本地 P1 唔使 GitHub creds，secret .env 都喺度）
# ─────────────────────────────────────────────────────────────────────────
services:
  jenkins:
    build:
      context: ci/jenkins
      dockerfile: Dockerfile
    image: authentik-jenkins:local
    container_name: authentik-jenkins
    restart: unless-stopped
    # 本地方便：root 直接用到 host docker socket（Mac/Win Docker Desktop 最穩）
    user: root
    environment:
      JENKINS_OPTS: "--prefix=/"
      TZ: "Asia/Hong_Kong"
      # build 完自動 POST 結果去 n8n（n8n 同 jenkins 喺同一 docker 網絡，用 service 名）。
      # n8n 個 workflow ACTIVATE 咗、webhook path = build-status 先收到。冇 workflow 都唔會爆（notify 失敗唔阻 pipeline）。
      N8N_NOTIFY_URL: "http://n8n:5678/webhook/build-status"
    ports:
      - "8080:8080"      # Jenkins UI
      - "50000:50000"    # agent port（保留）
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ${REPO_DIR:-./}:/repo          # 本地 repo（build context + deploy 用）
    extra_hosts:
      - "host.docker.internal:host-gateway"

  n8n:
    image: n8nio/n8n:latest
    container_name: authentik-n8n
    restart: unless-stopped
    environment:
      TZ: "Asia/Hong_Kong"
      GENERIC_TIMEZONE: "Asia/Hong_Kong"
      N8N_PORT: "5678"
      N8N_SECURE_COOKIE: "false"        # localhost http 用，免 cookie 阻登入
      N8N_RUNNERS_ENABLED: "true"
      # 2026-07-21：出公網 = certifinehk.com 個 named tunnel 加 hostname
      # n8n.certifinehk.com → authentik-n8n:5678（同 cloudflared 同一 docker
      # 網，唔使 host port）。WEBHOOK_URL 設公網值令 n8n 產生正確外部 webhook
      # 網址；Jenkins 內部照用 http://n8n:5678/webhook/... 唔受影響。
      # ⚠️ 呢個 subdomain 一定要喺 Cloudflare Access 後面（ops 台有 secret）。
      WEBHOOK_URL: "${N8N_WEBHOOK_URL:-https://n8n.certifinehk.com/}"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 2026-07-21：暫時加嚟畀 n8n webhook 測試用嘅 Cloudflare quick tunnel（唔使 token/login，
  # 同 certifine 嗰個正式 tunnel 完全獨立）。個 https URL 每次重起都會變，喺 log 度睇：
  #   docker logs authentik-n8n-tunnel --tail 20
  # 攞到 URL 之後 export N8N_WEBHOOK_URL=https://xxxx.trycloudflare.com/ 再重起 n8n。
  # 唔再需要就可以刪走成個 n8n-tunnel service。
  n8n-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: authentik-n8n-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://n8n:5678
    depends_on:
      - n8n

volumes:
  jenkins_home:
  n8n_data:
