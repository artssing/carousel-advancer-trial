<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 · Authentik</title>
<link rel="stylesheet" href="theme.css">
<style>
  .auth-wrap{min-height:calc(100vh - 66px);display:grid;grid-template-columns:1.1fr .9fr}
  .left{padding:70px 8% ;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(150deg,#0A2540,#123f5f);color:#fff}
  .left .eyebrow{color:var(--accent)}
  .left h1{font-size:38px;color:#fff;margin:14px 0 16px;max-width:420px}
  .left p{color:#9db4cc;max-width:400px}
  .left .pts{margin-top:28px;display:flex;flex-direction:column;gap:14px}
  .left .pt{display:flex;gap:12px;align-items:flex-start;font-size:14px;color:#cdd9e6}
  .left .pt svg{flex-shrink:0;margin-top:2px}
  .right{display:flex;align-items:center;justify-content:center;padding:40px}
  .formcard{width:100%;max-width:380px}
  .seg{display:flex;background:var(--surface-2);border-radius:10px;padding:4px;margin-bottom:24px}
  .seg a{flex:1;text-align:center;padding:9px;border-radius:7px;font-size:14px;font-weight:600;color:var(--text-3)}
  .seg a.on{background:#fff;color:var(--primary);box-shadow:var(--sh-1)}
  .oauth{display:flex;gap:10px;margin-bottom:18px}
  .oauth button{flex:1;border:1px solid var(--line-2);background:#fff;border-radius:8px;padding:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;box-shadow:var(--sh-1)}
  .divider-txt{display:flex;align-items:center;gap:12px;color:var(--text-3);font-size:12px;margin:6px 0 18px}
  .divider-txt::before,.divider-txt::after{content:"";flex:1;height:1px;background:var(--line)}
</style>
</head>
<body>
<header class="topbar"><div class="container">
  <div class="brand">AUTHEN<span class="dot">·</span>TIK</div>
  <nav class="nav"><a href="browse.html">瀏覽</a><a href="#">鑑定師</a><a href="sell.html">出售</a><a href="#">信任機制</a></nav>
  <div class="nav-right"><a href="home.html">返回首頁</a></div>
</div></header>

<div class="auth-wrap">
  <div class="left">
    <div class="eyebrow">Authenticated Resale · Hong Kong</div>
    <h1 class="display">加入 Authentik，安心買賣正品</h1>
    <p>逾一萬件經鑑定貨源，款項全程託管，真偽由具名鑑定師把關。</p>
    <div class="pts">
      <div class="pt"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00C48C" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>具名鑑定師把關，星級演算派生</div>
      <div class="pt"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00C48C" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>款項託管，鑑定通過才放款</div>
      <div class="pt"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00C48C" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>逾一萬強制鑑定，高價交易更安心</div>
    </div>
  </div>

  <div class="right">
    <div class="formcard">
      <div class="seg"><a class="on">登入</a><a>註冊</a></div>
      <div class="oauth">
        <button>Google 登入</button>
        <button>Apple 登入</button>
      </div>
      <div class="divider-txt">或用電郵</div>
      <div class="field"><label>電郵</label><input class="input" placeholder="you@example.com"></div>
      <div class="field"><label>密碼</label><input class="input" type="password" placeholder="••••••••"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <label style="display:flex;gap:8px;align-items:center;font-size:13px;color:var(--text-2);font-weight:400"><input type="checkbox"> 記住我</label>
        <a href="#" style="font-size:13px;color:var(--action);font-weight:600">忘記密碼？</a>
      </div>
      <a class="btn btn-primary btn-block btn-lg" href="home.html">登入</a>
      <p class="disclaimer" style="text-align:center;margin-top:16px">登入即表示你同意 <a href="#" style="color:var(--action)">服務條款</a> 及 <a href="#" style="color:var(--action)">私隱政策</a>。</p>
    </div>
  </div>
</div>
</body>
</html>
