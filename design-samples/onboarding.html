<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鑑定師申請 · Authentik</title>
<link rel="stylesheet" href="theme.css">
<style>
  .ob{display:grid;grid-template-columns:260px 1fr;gap:44px;padding:40px 0 72px;align-items:start}
  /* 左：步驟導航（垂直，非置中進度條）*/
  .ob-nav{position:sticky;top:24px}
  .ob-nav .eyebrow{margin-bottom:18px}
  .step{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
  .step:last-child{border-bottom:0}
  .step .num{width:26px;height:26px;border-radius:50%;border:1px solid var(--line-strong);
    display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;
    font-family:var(--serif);color:var(--ink-3)}
  .step.on .num{background:var(--accent);border-color:var(--accent);color:#fff}
  .step.done .num{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  .step .t{font-size:14px;font-weight:600}
  .step.on .t{color:var(--ink)}
  .step:not(.on) .t{color:var(--ink-3)}
  .step .d{font-size:12px;color:var(--ink-3);margin-top:2px}

  /* 右：表單卡 */
  .panel{max-width:620px}
  .panel h1{margin-bottom:6px}
  .fieldset{margin-top:28px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .upload{border:1px dashed var(--line-strong);border-radius:var(--radius);padding:22px;
    text-align:center;background:var(--card)}
  .upload .t{font-weight:600;font-size:14px}
  .upload .d{font-size:12px;color:var(--ink-3);margin:4px 0 12px}
  .chk{display:flex;gap:10px;align-items:flex-start;padding:12px 0}
  .chk .box{width:18px;height:18px;border:1.5px solid var(--line-strong);border-radius:4px;flex-shrink:0;margin-top:2px}
  .chk.on .box{background:var(--accent);border-color:var(--accent)}
  .foot-actions{display:flex;justify-content:space-between;margin-top:32px;padding-top:24px;border-top:1px solid var(--line)}
</style>
</head>
<body>

<header class="topbar">
  <div class="container">
    <div class="brand">AUTHEN<span class="dot">·</span>TIK</div>
    <nav class="nav"><a>鑑定工作台</a><a>收入</a><a>檔案</a></nav>
    <div class="nav-right"><span class="eyebrow">鑑定師申請</span></div>
  </div>
</header>

<div class="container">
  <div class="ob">

    <!-- 步驟導航 -->
    <aside class="ob-nav">
      <div class="eyebrow">申請進度</div>
      <div class="step done"><div class="num">✓</div>
        <div><div class="t">帳戶與身分</div><div class="d">已驗證</div></div></div>
      <div class="step on"><div class="num">2</div>
        <div><div class="t">專業資歷</div><div class="d">專長 · 年資 · 證書</div></div></div>
      <div class="step"><div class="num">3</div>
        <div><div class="t">店舖與收費</div><div class="d">地址 · 費率</div></div></div>
      <div class="step"><div class="num">4</div>
        <div><div class="t">合約與 E&amp;O 保險</div><div class="d">責任聲明</div></div></div>
      <div class="step"><div class="num">5</div>
        <div><div class="t">審核</div><div class="d">1–3 個工作天</div></div></div>
    </aside>

    <!-- 表單 -->
    <section class="panel">
      <div class="eyebrow">步驟 2 / 5</div>
      <h1 class="display" style="font-size:28px">專業資歷</h1>
      <p style="color:var(--ink-2);margin-top:6px">
        你的資歷會構成公開檔案的一部分。星級不由此填寫決定 —— 星級純由日後完成單數與爭議率演算派生，平台不可手改。
      </p>

      <div class="fieldset">
        <div class="field">
          <label>鑑定專長 <span class="hint">可多選，決定可接單品類</span></label>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">
            <span class="pill pill-verify">名牌手袋 ✓</span>
            <span class="pill pill-tier">腕錶</span>
            <span class="pill pill-tier">波鞋</span>
            <span class="pill pill-tier">珠寶首飾</span>
            <span class="pill pill-tier">卡牌收藏</span>
          </div>
        </div>

        <div class="two">
          <div class="field">
            <label>從業年資</label>
            <input class="input" placeholder="例：8 年">
          </div>
          <div class="field">
            <label>每週可接單量 <span class="hint">預估</span></label>
            <input class="input" placeholder="例：30 單">
          </div>
        </div>

        <div class="field">
          <label>專業簡介 <span class="hint">公開顯示，建議 50–150 字</span></label>
          <textarea class="textarea" placeholder="例：前拍賣行手袋部門鑑定師，專攻 Chanel 及 Hermès，熟悉五金年份碼與皮革工藝⋯"></textarea>
        </div>

        <div class="field">
          <label>資歷證明 <span class="hint">證書、僱主證明或作品集</span></label>
          <div class="upload">
            <div class="t">上載證明文件</div>
            <div class="d">PDF / JPG / PNG · 單檔上限 10MB</div>
            <button class="btn btn-ghost">選擇檔案</button>
          </div>
        </div>
      </div>

      <div class="note-box note-info" style="margin-top:8px">
        審核只核實你的身分與資歷真確性，不代表平台為你的鑑定結果背書。所有鑑定責任由你按合約及 E&amp;O 保險承擔。
      </div>

      <div class="foot-actions">
        <button class="btn btn-ghost">← 上一步</button>
        <button class="btn btn-primary btn-lg">儲存並繼續 →</button>
      </div>
    </section>

  </div>
</div>

</body>
</html>
