plate-columns:1fr 380px;gap:24px;align-items:start}\n  .gal{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px}\n  .gal .im{aspect-ratio:1/1;border-radius:9px;border:1px solid var(--line);background:linear-gradient(135deg,#eef1fc,#dfe4f6);position:relative}\n  .gal .im .wm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;letter-spacing:.12em;color:#95a0c8}\n  .kv{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}\n  .kv div{padding:11px 14px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}\n  .kv div:nth-child(2n){border-right:0}\n  .kv .k{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);margin-bottom:3px}\n  .kv b{font-weight:600;font-size:13px}\n  .upload{border:1px dashed var(--line-2);border-radius:10px;padding:20px;text-align:center;background:var(--surface-2)}\n  .evid{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}\n  .evid .v{width:96px;height:64px;border-radius:8px;background:linear-gradient(135deg,#242c63,#333e70);position:relative;display:flex;align-items:center;justify-content:center}\n  .evid .v svg{opacity:.9}\n  .evid .v .len{position:absolute;right:5px;bottom:4px;font-size:10px;color:#d6cbee;font-weight:600}\n  .vpanel{position:sticky;top:82px}\n","body":"\n<div class=\"portal\">\n  <aside class=\"sidebar\">\n    <div class=\"brand\">AUTHEN<span>·</span>TIK</div>\n    <div class=\"role\">鑑定師 Portal</div>\n    <nav class=\"snav\">\n      <a href=\"dashboard.html\">工作台</a>\n      <a class=\"on\" href=\"inbox.html\">收件匣 <span class=\"badge\">5</span></a>\n      <a href=\"messages.html\">訊息 <span class=\"badge\">2</span></a>\n      <a href=\"earnings.html\">收入</a>\n      <a href=\"profile.html\">檔案</a>\n    </nav>\n    <div class=\"me\"><div class=\"av\">米</div><div><div class=\"nm\">Milan Leung</div><div class=\"st\">★★★★★ · 在職</div></div></div>\n  </aside>\n\n  <div class=\"main\">\n    <div class=\"topline\">\n      <div><div class=\"pt\"><a href=\"inbox.html\" style=\"color:var(--action);font-weight:600\">收件匣</a> / 訂單 #AZ-10482</div>\n        <h1 class=\"display\" style=\"margin-top:2px\">鑑定工作台</h1></div>\n      <span class=\"pill pill-brand\">順豐到件 · 待提交</span>\n    </div>\n\n    <div class=\"content\">\n      <div class=\"work\">\n        <div>\n          <!-- 貨品 -->\n          <div class=\"card card-pad\" style=\"margin-bottom:16px\">\n            <div class=\"section-label\">貨品資料</div>\n            <div style=\"display:flex;gap:14px;margin-bottom:14px\">\n              <div style=\"width:80px;height:80px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#eef1fc,#dfe4f6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;letter-spacing:.14em;color:#95a0c8\">CHANEL</div>\n              <div><div style=\"font-weight:600\">Chanel Classic Flap Medium · Caviar 金扣</div>\n                <div class=\"mono\" style=\"margin-top:4px\">系列編號 A01112 · 黑色荔枝皮</div>\n                <div style=\"margin-top:8px;display:flex;gap:6px\"><span class=\"pill pill-tier\">Tier 3</span><span class=\"pill pill-tier\">九成新</span></div></div>\n              <div style=\"margin-left:auto;text-align:right\"><div class=\"mono\">你的鑑定費</div><b style=\"font-size:16px;color:var(--action)\">HK$1,360</b></div>\n            </div>\n            <div class=\"kv\">\n              <div><div class=\"k\">賣家</div><b>Jenny K. ★★★★★</b></div>\n              <div><div class=\"k\">買家</div><b>Alice C.</b></div>\n              <div><div class=\"k\">附件</div><b>塵袋 · 保卡 · 單據</b></div>\n              <div><div class=\"k\">交收</div><b>順豐到件（已簽收）</b></div>\n            </div>\n          </div>\n\n          <!-- 賣家上載相 -->\n          <div class=\"card card-pad\" style=\"margin-bottom:16px\">\n            <div class=\"section-label\">賣家上載相片</div>\n            <div class=\"gal\"><div class=\"im\"><div class=\"wm\">正面</div></div><div class=\"im\"><div class=\"wm\">五金</div></div><div class=\"im\"><div class=\"wm\">內裡</div></div><div class=\"im\"><div class=\"wm\">日期碼</div></div><div class=\"im\"><div class=\"wm\">底部</div></div><div class=\"im\"><div class=\"wm\">單據</div></div></div>\n          </div>\n\n          <!-- 鑑定證據上載 -->\n          <div class=\"card card-pad\">\n            <div class=\"section-label\">鑑定證據 · 影片 + 相片</div>\n            <div class=\"upload\">\n              <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6366f1\" stroke-width=\"2\" style=\"margin:0 auto 8px\"><path d=\"M23 7l-7 5 7 5V7z\"/><rect x=\"1\" y=\"5\" width=\"15\" height=\"14\" rx=\"2\"/></svg>\n              <div style=\"font-weight:600;font-size:14px\">上載鑑定影片</div>\n              <div class=\"mono\" style=\"margin:4px 0 12px\">MP4 / MOV · 建議連續拍攝五金、車線、日期碼</div>\n              <button class=\"btn btn-ghost btn-sm\">選擇檔案</button>\n              <input type=\"file\" accept=\"video/*\" hidden>\n            </div>\n            <div class=\"evid\">\n              <div class=\"v\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><polygon points=\"5 3 19 12 5 21 5 3\"/></svg><span class=\"len\">0:42</span></div>\n              <div class=\"v\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><polygon points=\"5 3 19 12 5 21 5 3\"/></svg><span class=\"len\">1:08</span></div>\n            </div>\n          </div>\n        </div>\n\n        <!-- 判定面板 -->\n        <div>\n          <div class=\"card card-pad vpanel\">\n            <div class=\"section-label\">鑑定結果</div>\n            <div class=\"opt sel-pass\" style=\"margin-bottom:10px\"><span class=\"dot\" style=\"border-color:var(--pass);background:var(--pass)\"></span>\n              <div><div class=\"t\" style=\"color:var(--pass)\">✓ 通過（正品）</div><div class=\"d\">確認為真品，可放款予賣家</div></div></div>\n            <div class=\"opt\" style=\"margin-bottom:10px\"><span class=\"dot\"></span>\n              <div><div class=\"t\">✕ 不通過（非正品）</div><div class=\"d\">判定為仿品，買家全額退款</div></div></div>\n            <div class=\"opt\" style=\"margin-bottom:14px\"><span class=\"dot\"></span>\n              <div><div class=\"t\">？ 未能確定</div><div class=\"d\">證據不足，需進一步處理</div></div></div>\n\n            <div class=\"note-incon\" style=\"margin-bottom:16px\">\n              <b>「未能確定」說明：</b>當貨品狀態、缺件或影像不足以下定論時使用。系統會通知買賣雙方，訂單轉入人工覆核，不會即時放款或退款。\n            </div>\n\n            <div class=\"field\"><label>鑑定備註 <span class=\"hint\">會記入報告</span></label>\n              <textarea class=\"textarea\" placeholder=\"例：五金雷射刻字清晰、車線密度一致、日期碼與年份相符⋯\">五金雷射刻字清晰，車線密度一致，日期碼與年份相符，皮革紋理及氣味正常。判定為正品。</textarea></div>\n\n            <label style=\"display:flex;gap:9px;align-items:flex-start;font-size:12px;color:var(--text-2);margin-bottom:16px\">\n              <input type=\"checkbox\" checked style=\"margin-top:2px\">\n              <span>本人以具名鑑定師身分，按合約及 E&amp;O 保險為此判定負責。</span></label>\n\n            <button class=\"btn btn-pass btn-block btn-lg\">提交鑑定結果</button>\n            <p class=\"disclaimer\" style=\"margin-top:12px\">提交後結果通知買賣雙方；平台為資訊中介，不參與或覆核你的專業判定。</p>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</div>\n"},"messages":{"style":"\n  /* IM 專用：三欄，滿高，無 content padding */\n  .im{display:grid;grid-template-columns:300px 1fr 288px;height:calc(100vh - 65px)}\n  /* 對話列表 */\n  .convlist{border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}\n  .convsearch{padding:14px}\n  .convsearch input{width:100%;font-family:inherit;font-size:13px;border:1px solid var(--line-2);border-radius:8px;padding:9px 12px}\n  .convs{overflow-y:auto;flex:1}\n  .conv{display:flex;gap:11px;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--line)}\n  .conv:hover{background:var(--surface-2)}\n  .conv.on{background:var(--brand-soft)}\n  .conv .av{width:42px;height:42px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#eef1fe,#dfe4fb);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--action-2)}\n  .conv .c{flex:1;min-width:0}\n  .conv .top{display:flex;justify-content:space-between;align-items:baseline}\n  .conv .nm{font-weight:600;font-size:14px}\n  .conv .tm{font-size:11px;color:var(--text-3)}\n  .conv .lastmsg{font-size:12px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}\n  .conv .unread{background:var(--action);color:#fff;font-size:11px;font-weight:800;border-radius:999px;padding:0 6px;min-width:18px;text-align:center}\n  /* 聊天窗 */\n  .thread{display:flex;flex-direction:column;min-height:0}\n  .thead{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line)}\n  .thead .av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#eef1fe,#dfe4fb);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--action-2)}\n  .thead .who{font-weight:700;font-size:15px}\n  .thead .sub{font-size:12px;color:var(--text-3)}\n  .thead .roles{margin-left:auto;display:flex;gap:6px}\n  .msgs{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:12px;background:var(--surface-2)}\n  .sys{align-self:center;font-size:12px;color:var(--text-3);background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px 14px}\n  .msg{max-width:66%;display:flex;flex-direction:column;gap:3px}\n  .msg .who{font-size:11px;color:var(--text-3);font-weight:600}\n  .bubble{padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.5}\n  .msg.them{align-self:flex-start}\n  .msg.them .bubble{background:#fff;border:1px solid var(--line);border-top-left-radius:4px}\n  .msg.me{align-self:flex-end;align-items:flex-end}\n  .msg.me .bubble{background:var(--action);color:#fff;border-top-right-radius:4px}\n  .msg .rcpt{font-size:10px;color:var(--text-3)}\n  .msg .rcpt .rea >\n    </nav>\n    <div class=\"me\"><div class=\"av\">米</div><div><div class=\"nm\">Milan Leung</div><div class=\"st\">★★★★★ · 在職</div></div></div>\n  </aside>\n\n  <div class=\"main\">\n    <div class=\"im\">\n      <!-- 對話列表 -->\n      <div class=\"convlist\">\n        <div class=\"convsearch\"><input placeholder=\"搜尋對話…\"></div>\n        <div class=\"convs\">\n          <div class=\"conv on\">\n            <div class=\"av\">A</div>\n            <div class=\"c\"><div class=\"top\"><span class=\"nm\">Alice C. · Jenny K.</span><span class=\"tm\">14:02</span></div>\n              <div class=\"lastmsg\">好，15:00 尖沙咀見。</div></div>\n          </div>\n          <div class=\"conv\">\n            <div class=\"av\">D</div>\n            <div class=\"c\"><div class=\"top\"><span class=\"nm\">David W. · Tom W.</span><span class=\"tm\">昨日</span></div>\n              <div class=\"lastmsg\">Rolex 面交改咗 17:30。</div></div>\n            <span class=\"unread\">2</span>\n          </div>\n          <div class=\"conv\">\n            <div class=\"av\">B</div>\n            <div class=\"c\"><div class=\"top\"><span class=\"nm\">Bob L.</span><span class=\"tm\">週四</span></div>\n              <div class=\"lastmsg\">收到，已寄出。</div></div>\n          </div>\n        </div>\n      </div>\n\n      <!-- 聊天窗 -->\n      <div class=\"thread\">\n        <div class=\"thead\">\n          <div class=\"av\">A</div>\n          <div><div class=\"who\">Alice C. · Jenny K.</div><div class=\"sub\">訂單 #AZ-10482 · 三方對話</div></div>\n          <div class=\"roles\"><span class=\"pill pill-tier\">買家</span><span class=\"pill pill-tier\">賣家</span><span class=\"pill pill-brand\">你 · 鑑定師</span></div>\n        </div>\n\n        <div class=\"msgs\">\n          <div class=\"sys\">訂單 #AZ-10482 已建立 · Milan Leung 已指派為鑑定師</div>\n\n          <div class=\"msg them\"><span class=\"who\">Jenny K.（賣家）</span>\n            <div class=\"bubble\">你好 Milan，個袋已經寄咗去你工作室，順豐單號 SF123456789。</div></div>\n          <div class=\"msg them\"><span class=\"who\">Alice C.（買家）</span>\n            <div class=\"bubble\">麻煩晒，想問大概幾時有鑑定結果？</div></div>\n\n          <div class=\"msg me\">\n            <div class=\"bubble\">收到貨，今日會做鑑定。若三方面交可以即場過檢，我下午 15:00 喺尖沙咀工作室得閒。</div>\n            <span class=\"rcpt\"><span class=\"read\">✓✓ 已讀</span> · 13:48</span></div>\n\n          <!-- 面交 sentinel -->\n          <div class=\"sentinel\">\n            <div class=\"h\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6366f1\" stroke-width=\"2\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"/><path d=\"M16 2v4M8 2v4M3 10h18\"/></svg>已安排三方面交</div>\n            <div class=\"body\">今日 15:00 · Milan 名牌鑑定工作室（尖沙咀漢口道 28 號 1203 室）· 買賣雙方到場即場交收</div>\n            <div class=\"acts\"><button class=\"btn btn-primary btn-sm\">加入行事曆</button><button class=\"btn btn-ghost btn-sm\">查看地圖</button></div>\n          </div>\n\n          <div class=\"msg them\"><span class=\"who\">Alice C.（買家）</span><div class=\"bubble\">好，15:00 尖沙咀見。</div></div>\n          <div class=\"msg them\"><span class=\"who\">Jenny K.（賣家）</span><div class=\"bubble\">👌 準時到。</div></div>\n        </div>\n\n        <div class=\"composer\">\n          <input placeholder=\"輸入訊息…\">\n          <button class=\"send\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><path d=\"M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z\"/></svg></button>\n        </div>\n      </div>\n\n      <!-- 情境卡（可撳去訂單，避免 dead-end）-->\n      <div class=\"ctx\">\n        <div class=\"section-label\">此對話關聯訂單</div>\n        <a class=\"minicard\" href=\"authenticate.html\">\n          <div class=\"im-ph\">CHANEL</div>\n          <div class=\"b\">\n            <div style=\"font-weight:600;font-size:13px\">Chanel Classic Flap Medium · Caviar 金扣</div>\n            <div class=\"mono\" style=\"margin-top:4px\">#AZ-10482 · Tier 3</div>\n          </div>\n        </a>\n        <div style=\"margin-top:14px\">\n          <div class=\"kv\"><span>貨價</span><b>HK$68,000</b></div>\n          <div class=\"kv\"><span>你的鑑定費</span><b>HK$1,360</b></div>\n          <div class=\"kv\"><span>狀態</span><b style=\"color:var(--action)\">待鑑定</b></div>\n          <div class=\"kv\"><span>交收</span><b>三方面交</b></div>\n        </div>\n        <a class=\"btn btn-primary btn-block btn-sm\" href=\"authenticate.html\" style=\"margin-top:14px\">前往鑑定工作台</a>\n        <p class=\"disclaimer\" style=\"margin-top:12px\">平台為資訊中介；此對話僅作協調，真偽判定以你正式提交之鑑定結果為準。</p>\n      </div>\n    </div>\n  </div>\n</div>\n"},"earnings":{"style":"\n  .balcard{background:linear-gradient(135deg,#242c63,#3f43a8);color:#fff;border-radius:14px;padding:26px;box-shadow:var(--sh-3);position:relative;overflow:hidden;margin-bottom:16px}\n  .balcard .l{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#c3b3e6}\n  .balcard .amt{font-size:36px;font-weight:800;margin:8px 0 4px}\n  .balcard .sub{font-size:13px;color:#c3b3e6}\n  .balcard .acts{display:flex;gap:10px;margin-top:18px}\n  .balcard .wm{position:absolute;right:20px;bottom:14px;font-weight:800;letter-spacing:.16em;opacity:.3;font-size:14px}\n  .subrow{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}\n  .txn{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}\n  .txn:last-child{border-bottom:0}\n  .txn .ic{width:38px;height:38px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;color:var(--action)}\n  .txn .d{flex:1}.txn .t{font-weight:600;font-size:14px}.txn .s{font-size:12px;color:var(--text-3);margin-top:2px}\n  .txn .amt{font-weight:700;color:var(--pass)}\n","body":"\n<div class=\"portal\">\n  <aside class=\"sidebar\">\n    <div class=\"brand\">AUTHEN<span>·</span>TIK</div>\n    <div class=\"role\">鑑定師 Portal</div>\n    <nav class=\"snav\">\n      <a href=\"dashboard.html\">工作台</a>\n      <a href=\"inbox.html\">收件匣 <span class=\"badge\">5</span></a>\n      <a href=\"messages.html\">訊息 <span class=\"badge\">2</span></a>\n      <a class=\"on\" href=\"earnings.html\">收入</a>\n      <a href=\"profile.html\">檔案</a>\n    </nav>\n    <div class=\"me\"><div class=\"av\">米</div><div><div class=\"nm\">Milan Leung</div><div class=\"st\">★★★★★ · 在職</div></div></div>\n  </aside>\n\n  <div class=\"main\">\n    <div class=\"topline\"><div><h1 class=\"display\">收入</h1><div class=\"pt\">款項於鑑定通過並完成交收後入賬</div></div></div>\n\n    <div class=\"content\">\n      <div class=\"balcard\">\n        <div class=\"l\">可提現餘額</div>\n        <div class=\"amt\">HK$14,820</div>\n        <div class=\"sub\">另有 HK$3,420 待入賬（3 宗鑑定進行中）</div>\n        <div class=\"acts\"><button class=\"btn btn-primary\">提現</button><button class=\"btn btn-ghost\" style=\"background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);color:#fff;box-shadow:none\">交易紀錄</button></div>\n        <span class=\"wm\">AUTHENTICATOR</span>\n      </div>\n\n      <div class=\"subrow\">\n        <div class=\"card card-pad stat\"><div class=\"n\">HK$18,240</div><div class=\"l\">本月收入</div></div>\n        <div class=\"card card-pad stat\"><div class=\"n\">142</div><div class=\"l\">本月鑑定單</div></div>\n        <div class=\"card card-pad stat\"><div class=\"n\">HK$1.96M</div><div class=\"l\">累計收入</div></div>\n      </div>\n\n      <div class=\"card card-pad\">\n        <div class=\"tabs\" style=\"margin-bottom:14px\"><a class=\"on\">全部</a><a>已入賬</a><a>待入賬</a><a>提現</a></div>\n        <div class=\"txn\"><div class=\"ic\">✓</div><div class=\"d\"><div class=\"t\">Chanel WOC Caviar · 鑑定費</div><div class=\"s\">訂單 #AZ-10440 · 已通過 · 已入賬 · 2026-07-03</div></div><div class=\"amt\">+HK$560</div></div>\n        <div class=\"txn\"><div class=\"ic\">✓</div><div class=\"d\"><div class=\"t\">Rolex Datejust 41 · 鑑定費</div><div class=\"s\">訂單 #AZ-10431 · 已通過 · 已入賬 · 2026-07-02</div></div><div class=\"amt\">+HK$1,880</div></div>\n        <div class=\"txn\"><div class=\"ic\" style=\"color:var(--incon)\">◷</div><div class=\"d\"><div class=\"t\">Hermès Birkin 25 · 鑑定費</div><div class=\"s\">訂單 #AZ-10478 · 鑑定中 · 待入賬</div></div><div class=\"amt\" style=\"color:var(--text-3)\">HK$3,360</div></div>\n        <div class=\"txn\"><div class=\"ic\" style=\"color:var(--text-2)\">↑</div><div class=\"d\"><div class=\"t\">提現至 FPS 尾號 4567</div><div class=\"s\">已完成 · 2026-06-28</div></div><div class=\"amt\" style=\"color:var(--text-2)\">−HK$12,000</div></div>\n      </div>\n      <p class=\"disclaimer\" style=\"margin-top:14px\">「不通過」及「未能確定」不影響鑑定費收取。金額以 server 記錄為準。</p>\n    </div>\n  </div>\n</div>\n"},"profile":{"style":"\n  .cols{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start}\n  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}\n  .preview{position:sticky;top:82px}\n  .pv-head{display:flex;gap:12px;align-items:center;margin-bottom:12px}\n  .rating-note{font-size:12px;color:var(--text-3);line-height:1.6}\n","body":"\n<div class=\"portal\">\n  <aside class=\"sidebar\">\n    <div class=\"brand\">AUTHEN<span>·</span>TIK</div>\n    <div class=\"role\">鑑定師 Portal</div>\n    <nav class=\"snav\">\n      <a href=\"dashboard.html\">工作台</a>\n      <a href=\"inbox.html\">收件匣 <span class=\"badge\">5</span></a>\n      <a href=\"messages.html\">訊息 <span class=\"badge\">2</span></a>\n      <a href=\"earnings.html\">收入</a>\n      <a class=\"on\" href=\"profile.html\">檔案</a>\n    </nav>\n    <div class=\"me\"><div class=\"av\">米</div><div><div class=\"nm\">Milan Leung</div><div class=\"st\">★★★★★ · 在職</div></div></div>\n  </aside>\n\n  <div class=\"main\">\n    <div class=\"topline\"><div><h1 class=\"display\">鑑定師檔案</h1><div class=\"pt\">公開資料會顯示於你的鑑定師頁面</div></div>\n      <button class=\"btn btn-primary btn-sm\">儲存變更</button></div>\n\n    <div class=\"content\">\n      <div class=\"cols\">\n        <div>\n          <div class=\"tabs\"><a class=\"on\">基本資料</a><a>收費</a><a>專長</a><a>合約與保險</a></div>\n\n          <div class=\"card card-pad\" style=\"margin-bottom:16px\">\n            <div class=\"section-label\">店舖資料</div>\n            <div class=\"field\"><label>店舖名稱 <span class=\"hint\">公開</span></label><input class=\"input\" value=\"Milan 名牌鑑定工作室\"></div>\n            <div class=\"two\">\n              <div class=\"field\"><label>地區</label><select class=\"select\"><option>尖沙咀</option><option>中環</option><option>旺角</option></select></div>\n              <div class=\"field\"><label>從業年資</label><input class=\"input\" value=\"8 年\"></div>\n            </div>\n            <div class=\"field\"><label>店舖地址 <span class=\"hint\">面交時顯示予買賣雙方</span></label><input class=\"input\" value=\"尖沙咀漢口道 28 號 12 樓 1203 室\"></div>\n            <div class=\"field\" style=\"margin:0\"><label>專業簡介 <span class=\"hint\">公開</span></label>\n              <textarea class=\"textarea\">前拍賣行手袋部門鑑定師，八年經驗，專攻 Chanel 及 Hermès，熟悉五金年份碼與皮革工藝。</textarea></div>\n          </div>\n\n          <div class=\"card card-pad\" style=\"margin-bottom:16px\">\n            <div class=\"section-label\">收費設定</div>\n            <div class=\"two\">\n              <div class=\"field\"><label>費率 <span class=\"hint\">% of 貨價</span></label><input class=\"input\" value=\"2.0%\"></div>\n              <div class=\"field\" style=\"margin:0\"><label>最低收費</label><input class=\"input\" value=\"HK$600\"></div>\n            </div>\n            <div class=\"note-brand\" style=\"margin-top:6px\">平台會以 AI 監控費率是否偏離同品類基準；異常會提示，但你可自訂。</div>\n          </div>\n\n          <!-- E&O 警示 -->\n          <div class=\"card card-pad\" style=\"border-color:var(--incon-border)\">\n            <div class=\"section-label\" style=\"color:var(--incon)\">合約與 E&amp;O 保險</div>\n            <div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)\">\n              <div><b style=\"font-size:14px\">E&amp;O 專業責任保險</b><div class=\"mono\">保單 #EO-2024-8871 · 承保額 HK$2,000,000</div></div>\n              <span class=\"pill pill-pass\">有效至 2026-12</span></div>\n            <div class=\"note-incon\" style=\"margin-top:12px\">⚠ 保險到期前 30 日系統會提醒續保。<b>保險失效期間你將無法接單</b>，因為所有鑑定判定必須有 E&amp;O 承保。</div>\n          </div>\n        </div>\n\n        <!-- 公開預覽 -->\n        <div>\n          <div class=\"card card-pad preview\">\n            <div class=\"section-label\">公開頁面預覽</div>\n            <div class=\"pv-head\">\n              <div class=\"avatar\" style=\"width:52px;height:52px\">米</div>\n              <div><div style=\"font-weight:700\">Milan Leung <span class=\"stars\">★★★★★</span></div>\n                <div class=\"mono\">名牌手袋 · 尖沙咀</div></div>\n            </div>\n            <div style=\"display:flex;gap:18px;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:12px\">\n              <div><div style=\"font-weight:800;color:var(--primary)\">1,240</div><div class=\"mono\">鑑定單</div></div>\n              <div><div style=\"font-weight:800;color:var(--pass)\">0.3%</div><div class=\"mono\">爭議率</div></div>\n              <div><div style=\"font-weight:800;color:var(--primary)\">4.9</div><div class=\"mono\">評分</div></div>\n            </div>\n            <p class=\"rating-note\">★ 星級與爭議率由平台按實際完成單數演算派生，<b>不可手動修改</b>。此為演算法信任指標，非平台背書。</p>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</div>\n"},"onboarding":{"style":"\n  .topbar{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}\n  .topbar .in{max-width:900px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}\n  .topbar .brand{font-size:19px;letter-spacing:.18em;font-weight:800;color:var(--primary)}\n  .topbar .brand span{color:var(--action)}\n  .wrap{max-width:900px;margin:0 auto;padding:36px 24px 72px;display:grid;grid-template-columns:240px 1fr;gap:40px;align-items:start}\n  .steps{position:sticky;top:88px}\n  .step{display:flex;gap:13px;padding:14px 0;border-bottom:1px solid var(--line)}\n  .step:last-child{border-bottom:0}\n  .step .num{width:26px;height:26px;border-radius:50%;border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;color:var(--text-3);font-weight:700}\n  .step.on .num{background:var(--action);border-color:var(--action);color:#fff}\n  .step.done .num{background:var(--brand-soft);border-color:var(--action);color:var(--action)}\n  .step .t{font-size:14px;font-weight:600}.step.on .t{color:var(--primary)}.step:not(.on) .t{color:var(--text-3)}\n  .step .d{font-size:12px;color:var(--text-3);margin-top:2px}\n  .panel{max-width:560px}\n  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}\n  .upload{border:1px dashed var(--line-2);border-radius:10px;padding:22px;text-align:center;background:var(--surface-2)}\n  .foot{display:flex;justify-content:space-between;margin-top:30px;padding-top:22px;border-top:1px solid var(--line)}\n","body":"\n<header class=\"topbar\"><div class=\"in\">\n  <div class=\"brand\">AUTHEN<span>·</span>TIK</div>\n  <span class=\"mono\">鑑定師申請</span>\n</div></header>\n\n<div class=\"wrap\">\n  <aside class=\"steps\">\n    <div class=\"section-label\">申請進度</div>\n    <div class=\"step done\"><div class=\"num\">✓</div><div><div class=\"t\">帳戶與身分</div><div class=\"d\">已驗證</div></div></div>\n    <div class=\"step on\"><div class=\"num\">2</div><div><div class=\"t\">專業資歷</div><div class=\"d\">專長 · 年資 · 證書</div></div></div>\n    <div class=\"step\"><div class=\"num\">3</div><div><div class=\"t\">店舖與收費</div><div class=\"d\">地址 · 費率</div></div></div>\n    <div class=\"step\"><div class=\"num\">4</div><div><div class=\"t\">合約與 E&amp;O 保險</div><div class=\"d\">責任聲明</div></div></div>\n    <div class=\"step\"><div class=\"num\">5</div><div><div class=\"t\">審核</div><div class=\"d\">1–3 工作天</div></div></div>\n  </aside>\n\n  <section class=\"panel\">\n    <div class=\"eyebrow\">步驟 2 / 5</div>\n    <h1 class=\"display\" style=\"font-size:28px;margin:10px 0 8px\">專業資歷</h1>\n    <p style=\"color:var(--text-2)\">你的資歷會構成公開檔案。星級不由此填寫決定 —— 星級純由日後完成單數與爭議率演算派生，平台不可手改。</p>\n\n    <div style=\"margin-top:26px\">\n      <div class=\"field\"><label>鑑定專長 <span class=\"hint\">可多選，決定可接單品類</span></label>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-top:6px\">\n          <span class=\"pill pill-brand\">名牌手袋 ✓</span><span class=\"pill pill-tier\">腕錶</span>\n          <span class=\"pill pill-tier\">波鞋</span><span class=\"pill pill-tier\">珠寶首飾</span><span class=\"pill pill-tier\">卡牌收藏</span></div></div>\n      <div class=\"two\">\n        <div class=\"field\"><label>從業年資</label><input class=\"input\" placeholder=\"例：8 年\"></div>\n        <div class=\"field\"><label>每週可接單量</label><input class=\"input\" placeholder=\"例：30 單\"></div></div>\n      <div class=\"field\"><label>專業簡介 <span class=\"hint\">公開，建議 50–150 字</span></label>\n        <textarea class=\"textarea\" placeholder=\"例：前拍賣行手袋部門鑑定師，專攻 Chanel 及 Hermès⋯\"></textarea></div>\n      <div class=\"field\"><label>資歷證明 <span class=\"hint\">證書、僱主證明或作品集</span></label>\n        <div class=\"upload\"><div style=\"font-weight:600;font-size:14px\">上載證明文件</div>\n          <div class=\"mono\" style=\"margin:6px 0 12px\">PDF / JPG / PNG · 單檔上限 10MB</div>\n          <button class=\"btn btn-ghost btn-sm\">選擇檔案</button><input type=\"file\" hidden></div></div>\n    </div>\n\n    <div class=\"note-brand\">審核只核實你的身分與資歷真確性，不代表平台為你的鑑定結果背書。所有鑑定責任由你按合約及 E&amp;O 保險承擔。</div>\n\n    <div class=\"foot\"><button class=\"btn btn-ghost\">← 上一步</button><button class=\"btn btn-primary btn-lg\">儲存並繼續 →</button></div>\n  </section>\n</div>\n"}},NAV=[["dashboard","工作台"],["inbox","收件匣"],["authenticate","鑑定工作台"],["messages","訊息 IM"],["earnings","收入"],["profile","檔案"],["onboarding","申請 onboarding"]],LINK="document.addEventListener('click',function(e){var a=e.target.closest('a');if(!a)return;var h=a.getAttribute('href')||'';if(/\\.html$/.test(h)){e.preventDefault();parent.postMessage({go:h.replace('.html','')},'*');}});";
