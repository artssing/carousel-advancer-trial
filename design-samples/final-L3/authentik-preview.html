<script>
  var THEME="/* ============================================================\n   Authentik — 定稿主題：v4 色系 + L3 白底柔和陰影\n   驗證綠 #008766 · 板岩藍 #0A2540 · 亮青 #00C48C · 純白底\n   L3 特徵：sticky 半透明頂欄、卡片浮起陰影、搜尋框/band 有深度。\n   全套版面共用；page 只寫自己 layout。\n   ============================================================ */\n:root{\n  --bg:#FFFFFF;\n  --surface:#FFFFFF;\n  --surface-2:#f7f9fb;\n  --line:#E8EBEF;\n  --line-2:#d7dce2;\n\n  --text:#16233a;\n  --text-2:#505b6b;\n  --text-3:#8b95a3;\n\n  --primary:#0A2540;\n  --primary-2:#123056;\n  --on-primary:#FFFFFF;\n\n  --action:#008766;\n  --action-2:#00745a;\n  --on-action:#FFFFFF;\n  --accent:#00C48C;\n\n  --verify:#008766;\n  --verify-soft:#e3f4ee;\n  --verify-border:#b6e2d3;\n  --gold:#b98a2e;\n\n  --danger:#b23b2b;\n  --danger-soft:#f7e9e6;\n\n  --serif:\"Noto Serif HK\",\"Songti SC\",Georgia,serif;\n  --sans:\"PingFang HK\",\"Noto Sans HK\",\"Hiragino Sans\",-apple-system,\"Segoe UI\",Roboto,sans-serif;\n  --display:var(--sans);\n  --radius:12px;--radius-sm:8px;--maxw:1140px;\n\n  /* L3 陰影階梯 */\n  --sh-1:0 6px 20px -14px rgba(10,37,64,.28);\n  --sh-2:0 12px 34px -18px rgba(10,37,64,.34);\n  --sh-3:0 20px 50px -22px rgba(10,37,64,.42);\n}\n*{box-sizing:border-box;margin:0;padding:0}\nbody{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.55;font-size:15px;-webkit-font-smoothing:antialiased}\na{color:inherit;text-decoration:none}img{display:block;max-width:100%}\n.container{max-width:var(--maxw);margin:0 auto;padding:0 26px}\n\n.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--action);font-weight:700}\n.mono{font-size:12px;letter-spacing:.04em;color:var(--text-3)}\n.section-label{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);font-weight:700;margin-bottom:18px}\n.display{font-family:var(--display);font-weight:700;letter-spacing:-.01em;line-height:1.18;color:var(--primary)}\nh1.display{font-size:42px}h2.display{font-size:27px}h3.display{font-size:19px}\n.accent-word{color:var(--action)}\n\n/* L3 sticky 半透明頂欄 */\n.topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}\n.topbar .container{display:flex;align-items:center;justify-content:space-between;height:66px}\n.brand{font-size:20px;letter-spacing:.2em;font-weight:800;color:var(--primary)}\n.brand .dot{color:var(--action)}\n.nav{display:flex;gap:30px;font-size:14px;color:var(--text-2)}\n.nav a:hover{color:var(--primary)}\n.nav a.on{color:var(--primary);font-weight:600}\n.nav-right{display:flex;gap:18px;align-items:center;font-size:14px;color:var(--text-2)}\n.nav-right a:hover{color:var(--primary)}\n\n.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;font-size:14px;font-weight:600;letter-spacing:.01em;padding:12px 22px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid transparent;transition:.16s}\n.btn-primary{background:var(--action);color:var(--on-action);box-shadow:0 8px 20px -10px rgba(0,135,102,.5)}\n.btn-primary:hover{background:var(--accent)}\n.btn-ghost{background:#fff;border-color:var(--line-2);color:var(--text);box-shadow:var(--sh-1)}\n.btn-ghost:hover{border-color:var(--action);color:var(--action)}\n.btn-navy{background:var(--primary);color:var(--on-primary);box-shadow:0 8px 20px -10px rgba(10,37,64,.5)}\n.btn-navy:hover{background:var(--primary-2)}\n.btn-block{width:100%}.btn-lg{padding:15px 26px;font-size:15px}\n.btn-sm{padding:8px 14px;font-size:13px}\n\n/* L3 卡片浮起 */\n.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--sh-1)}\n.card-pad{padding:24px}\n.card-glow{border-color:var(--verify-border);box-shadow:0 12px 30px -16px rgba(0,135,102,.4)}\n\n.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.05em;text-transform:uppercase;font-weight:700;padding:5px 11px;border-radius:999px;border:1px solid transparent}\n.pill-verify{color:var(--verify);background:var(--verify-soft);border-color:var(--verify-border)}\n.pill-gold{color:var(--gold);background:#f6efe0;border-color:#ecdcba}\n.pill-tier{color:var(--text-2);background:var(--surface-2);border-color:var(--line-2)}\n.pill-status{color:var(--primary);background:#eef3f8;border-color:#d5e0ec}\n.stars{color:var(--gold);letter-spacing:1px;font-size:12px}\n\n.grid-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}\n.p-card{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:.16s;box-shadow:var(--sh-1)}\n.p-card:hover{transform:translateY(-2px);box-shadow:var(--sh-3)}\n.p-card .ph{aspect-ratio:1/1;position:relative;background:linear-gradient(135deg,#eef1f5,#e2e7ee)}\n.p-card .ph .wm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:13px;letter-spacing:.14em;color:#9aa3b5}\n.p-card .ph .top{position:absolute;top:12px;left:12px}\n.p-card .body{padding:14px 16px 16px;display:flex;flex-direction:column;flex:1}\n.p-card .title{font-size:14px;font-weight:600;min-height:2.6em;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}\n.p-card .meta{font-size:12px;color:var(--text-3);margin-top:5px}\n.p-card .row{margin-top:auto;padding-top:12px;display:flex;align-items:center;justify-content:space-between}\n.p-card .price{font-size:16px;font-weight:800;color:var(--primary)}\n\n.field{margin-bottom:18px}\n.field label{display:block;font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:7px}\n.field .hint{font-weight:400;color:var(--text-3)}\n.input,.select,.textarea{width:100%;font-family:inherit;font-size:14px;color:var(--text);background:#fff;border:1px solid var(--line-2);border-radius:var(--radius-sm);padding:11px 13px;transition:.15s;box-shadow:inset 0 1px 2px rgba(10,37,64,.03)}\n.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--action);box-shadow:0 0 0 3px rgba(0,135,102,.15)}\n.textarea{resize:vertical;min-height:90px}\n\n.opt{border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px 16px;cursor:pointer;background:#fff;transition:.15s;display:flex;gap:12px;align-items:flex-start;box-shadow:var(--sh-1)}\n.opt:hover{border-color:var(--line-2)}\n.opt.sel{border-color:var(--action);background:var(--verify-soft)}\n.opt .dot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--line-2);flex-shrink:0;margin-top:2px}\n.opt.sel .dot{border-color:var(--action);background:var(--action);box-shadow:inset 0 0 0 3px #fff}\n.opt .t{font-size:14px;font-weight:600}.opt .d{font-size:12px;color:var(--text-3);margin-top:3px}\n\n.disclaimer{font-size:12px;color:var(--text-3);line-height:1.65}\n.note-box{font-size:12px;line-height:1.6;padding:12px 14px;border-radius:var(--radius-sm)}\n.note-info{color:var(--action-2);background:var(--verify-soft);border:1px solid var(--verify-border)}\n.note-warn{color:var(--danger);background:var(--danger-soft);border:1px solid #eed8d1}\n\n.stat .n{font-size:32px;font-weight:800;line-height:1;color:var(--primary)}\n.stat .n .u{font-size:15px;color:var(--action)}\n.stat .l{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-top:8px;font-weight:600}\n\n.steps{display:flex;gap:26px;font-size:13px;color:var(--text-3)}\n.steps .on{color:var(--primary);font-weight:600}\n.steps .on::before{content:\"\";display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--action);margin-right:8px;vertical-align:middle}\n.divider{height:1px;background:var(--line);border:0}\n\n/* 標籤頁 tabs */\n.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:24px}\n.tabs a{padding:12px 18px;font-size:14px;font-weight:600;color:var(--text-3);border-bottom:2px solid transparent;margin-bottom:-1px}\n.tabs a:hover{color:var(--text-2)}\n.tabs a.on{color:var(--primary);border-color:var(--action)}\n\n.footer{border-top:1px solid var(--line);margin-top:70px;background:var(--surface-2)}\n.footer .container{padding-top:44px;padding-bottom:44px;display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap}\n.footer .col h4{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:12px;font-weight:700}\n.footer .col a{display:block;font-size:13px;color:var(--text-2);padding:4px 0}\n.footer .col a:hover{color:var(--primary)}\n@media(max-width:900px){.grid-cards{grid-template-columns:repeat(2,1fr)}.nav{display:none}h1.display{font-size:32px}}\n", DATA={"home":{"style":"\n  .hero-a{text-align:center;padding:66px 0 38px}\n  .hero-a h1{font-size:46px;max-width:760px;margin:14px auto 0}\n  .hero-a p{color:var(--text-2);max-width:520px;margin:16px auto 0}\n  .searchbar{max-width:680px;margin:30px auto 14px;display:flex;background:#fff;border:1px solid var(--line);\n    border-radius:14px;box-shadow:var(--sh-3);overflow:hidden}\n  .searchbar input{flex:1;border:0;outline:0;font-family:inherit;font-size:16px;padding:17px 20px;color:var(--text)}\n  .searchbar button{border:0;cursor:pointer;font-family:inherit;font-weight:700;font-size:15px;background:var(--action);color:#fff;padding:0 30px}\n  .searchbar button:hover{background:var(--accent)}\n  .quick{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:6px}\n  .quick a{font-size:13px;color:var(--text-2);border:1px solid var(--line);border-radius:999px;padding:6px 14px;background:#fff;box-shadow:var(--sh-1)}\n  .quick a:hover{border-color:var(--action);color:var(--action)}\n  .ticker{border:1px solid var(--line);border-radius:14px;margin:36px 0 0;background:#fff;overflow:hidden;box-shadow:var(--sh-2)}\n  .ticker .inner{display:flex;align-items:center;gap:22px;height:56px;padding:0 20px}\n  .ticker .lab{font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--action);display:flex;align-items:center
